name: combo-raport

services:
  # ── Development server (hot-reload) ───────────────────────────────────────
  dev:
    build:
      context: .
      target: dev
    container_name: combo_dev
    volumes:
      # Live source sync – edycja pliku na hoście natychmiast widoczna w kontenerze
      - .:/app
      # Prevent host node_modules from overriding container's
      - /app/node_modules
      - combo_data:/app/data
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - AUTH_DATA_PATH=/app/data/auth.json
    networks:
      - combo_net
    restart: unless-stopped
    profiles:
      - dev

  # ── Production preview (nginx) ─────────────────────────────────────────────
  prod:
    build:
      context: .
      target: prod
    container_name: combo_prod
    ports:
      - "4173:4173"
    volumes:
      - combo_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4173
      - AUTH_DATA_PATH=/app/data/auth.json
      - EMAIL_DATA_PATH=/app/data/email.json
    networks:
      - combo_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4173/"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    profiles:
      - prod

  # ── Second prod instance exposed on port 87 (combo87.toadres.pl) ─────────
  prod87:
    build:
      context: .
      target: prod
    image: combo-raport-prod:latest
    container_name: combo_prod87
    ports:
      - "87:4173"
    volumes:
      - combo_data_87:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4173
      - AUTH_DATA_PATH=/app/data/auth.json
      - EMAIL_DATA_PATH=/app/data/email.json
    networks:
      - combo_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4173/"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    profiles:
      - prod87

volumes:
  combo_data:
    name: combo_data
  combo_data_87:
    name: combo_data_87

networks:
  # Izolowana sieć – nie koliduje z sieciami spzw_backend / spzw_frontend
  combo_net:
    name: combo_net
    driver: bridge
